services:
  josix_example:
    build: .
    container_name: josix_example
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "80:8000"
    environment:
      APP_URL: http://localhost/
    command: php -S 0.0.0.0:8000 -t /var/www/public /var/www/public/index.php
    healthcheck:
      test: ["CMD", "php", "-r", "echo @file_get_contents('http://127.0.0.1:8000/') !== false ? 'ok' : exit(1);"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 2s